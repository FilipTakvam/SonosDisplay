<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TUNEFRAME Setup</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --border: #2e2e2e;
            --text: #f5f5f5;
            --muted: #8a8a8a;
            --accent: #f5f5f5;
            --radius: 10px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .wordmark {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.18em;
            margin-bottom: 24px;
            color: var(--text);
        }

        .card {
            width: 100%;
            max-width: 380px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px 28px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        .header svg {
            flex-shrink: 0;
        }

        h1 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
            letter-spacing: 0.06em;
        }

        p.subtitle {
            color: var(--muted);
            font-size: 13px;
            margin: 6px 0 28px;
            line-height: 1.5;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text);
        }

        .field {
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            padding: 11px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #0f0f0f;
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: border-color 0.15s ease;
        }

        input:focus {
            border-color: var(--accent);
        }

        input::placeholder {
            color: #555;
        }

        button {
            width: 100%;
            padding: 13px;
            margin-top: 8px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: #0a0a0a;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        button:hover {
            background: #d8d8d8;
        }

        button:focus-visible,
        input:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }
    </style>
</head>

<body>
    <div class="wordmark">TUNEFRAME</div>
    <div class="card">
        <div class="header"> <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f5f5f5"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12.55a11 11 0 0 1 14.08 0" />
                <path d="M1.42 9a16 16 0 0 1 21.16 0" />
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
                <line x1="12" y1="20" x2="12" y2="20" />
            </svg>
            <h1>Network Setup</h1>
        </div>
        <p class="subtitle">Enter Wifi credentials and name of speaker</p>
        <form method="POST" action="/save">
            <div class="field"> <label for="ssid">Network name (SSID)</label> <input id="ssid" name="ssid" type="text"
                    required autocomplete="off" placeholder="e.g. Home WiFi"> </div>
            <div class="field"> <label for="pass">Password</label> <input id="pass" name="pass" type="password"
                    autocomplete="off" placeholder="Leave blank if none"> </div>
            <div class="field"> <label for="sonos_name">Speaker name</label> <input id="sonos_name" name="sonos_name"
                    type="text" required autocomplete="off" placeholder="e.g. Living Room"> </div> <button
                type="submit">Save</button>
        </form>
    </div>
</body>

</html>
